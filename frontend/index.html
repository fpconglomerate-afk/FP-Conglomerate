<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://www.fpconglomerate.com/" />
    <title>FP Conglomerate | Trust, Integrity, Service Excellence</title>
    <meta name="description" content="FP Conglomerate is an Abuja-based multi-sector African group: ministry (OBA), solutions (AGE), real estate and services (BSC), and humanitarian NGO programs (MIA). Interim office: Gwagwalada, Abuja." />
    <meta name="author" content="FP Conglomerate" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />

    <meta property="og:title" content="FP Conglomerate | Trust, Integrity, Service Excellence" />
    <meta property="og:description" content="Abuja-based multi-sector group: OBA, AGE, BSC, and MIA humanitarian NGO programs. Trust, integrity, service excellence." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.fpconglomerate.com/" />
    <meta property="og:image" content="https://www.fpconglomerate.com/logos/bsc-logo.png" />
    <meta property="og:locale" content="en_NG" />
    <meta property="og:site_name" content="FP Conglomerate" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FP Conglomerate" />
    <meta name="twitter:description" content="Trusted service delivery across ministry, commerce, construction, real estate, and humanitarian impact." />
    <meta name="twitter:image" content="https://www.fpconglomerate.com/logos/bsc-logo.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "FP Conglomerate",
        "url": "https://www.fpconglomerate.com/",
        "logo": "https://www.fpconglomerate.com/logos/bsc-logo.png",
        "description": "Abuja-based multi-sector African group coordinating OBA, AGE, BSC, and MIA under shared standards for trust, integrity, and service excellence.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Abuja",
          "addressCountry": "NG"
        }
      }
    </script>

    <script>
      (function () {
        var k = "fp-conglomerate-ui-theme";
        try {
          var v = localStorage.getItem(k);
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var useDark = v === "dark" || (v !== "light" && prefersDark);
          document.documentElement.classList.toggle("dark", useDark);
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.pexels.com" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
